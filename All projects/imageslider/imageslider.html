<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="imageslider.css">
</head>
<body>

    <div class="slider">
        <div class="slides">
            <!-- Slide Images -->
            <div class="slide"><img src="header img.png" alt="Image 1"></div>
            <div class="slide"><img src="Screenshot (17).png" alt="Image 2"></div>
            <div class="slide"><img src="Web Solution img.png" alt="Image 3"></div>
            <div class="slide"><img src="Web Solution img.png" alt="Image 4"></div>
        </div>

        <!-- Navigation Buttons -->
        <button class="prev" onclick="prevSlide()">&#10094;</button>
        <button class="next" onclick="nextSlide()">&#10095;</button>
    </div>

    <script src="imageslider.js"></script>
</body>
</html>
